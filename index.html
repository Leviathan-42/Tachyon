<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tachyon</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Browser chrome wrapper -->
  <div class="browser-chrome">

    <!-- Tab bar -->
    <div class="tab-bar">
      <div class="tabs-content">
        <div class="chrome-tab active">
          <div class="tab-bg"></div>
          <div class="tab-content">
            <div class="tab-favicon">⚡</div>
            <div class="tab-title">New Tab</div>
            <button class="tab-close" title="Close tab" onclick="closeInline()" aria-label="Close tab">&#x2715;</button>
          </div>
        </div>
        <button class="new-tab-btn" title="New tab" onclick="closeInline(); document.getElementById('customUrl').focus()">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M7 7V1h2v6h6v2H9v6H7V9H1V7z"/></svg>
        </button>
      </div>
    </div>

    <!-- Navigation bar -->
    <div class="nav-bar">
      <div class="nav-btns">
        <button class="nav-btn disabled" title="Back" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="nav-btn disabled" title="Forward" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <button class="nav-btn" id="reload-btn" title="Reload" onclick="(function(){var f=document.getElementById('inline-frame');if(f&&f.src){f.src=f.src;}else{document.getElementById('customUrl').focus();}})()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
      </div>

      <!-- Address bar -->
      <div class="address-bar-wrap" id="address-wrap">
        <div class="address-scheme" id="address-scheme">
          <span id="proxy-dot" class="dot offline" title="Proxy offline"></span>
        </div>
        <input
          type="text"
          id="customUrl"
          class="address-input"
          placeholder="Search or enter URL"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="address-go" id="go-btn" onclick="launchCustom('aboutblank')" title="Open in new tab (AB cloaked)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>

      <div class="nav-extra">
        <button class="nav-btn" title="Open inline" onclick="launchCustom('iframe')" id="inline-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
        </button>
        <div class="proxy-label-wrap">
          <span id="proxy-label" class="proxy-status-text">Proxy offline</span>
        </div>
      </div>
    </div>

    <!-- Page content area -->
    <div class="page-area">

      <!-- New-tab page (launcher) -->
      <div id="new-tab-page" class="new-tab-page">
        <div class="nt-hero">
          <div class="nt-mascot">⚡</div>
          <h1 class="nt-title">Tachyon</h1>
          <p class="nt-subtitle">Fast, private browsing. Type a URL above or choose a site below.</p>
        </div>

        <div class="nt-sites-label">Quick access</div>

        <div class="rh-grid" id="grid">
          <div class="rh-card" role="button" tabindex="0" onclick="launch('youtube')">
            <div class="rh-icon">▶</div>
            <div class="rh-label">YouTube</div>
          </div>
          <div class="rh-card" role="button" tabindex="0" onclick="launch('spotify')">
            <div class="rh-icon">🎵</div>
            <div class="rh-label">Spotify</div>
          </div>
          <div class="rh-card" role="button" tabindex="0" onclick="launch('discord')">
            <div class="rh-icon">💬</div>
            <div class="rh-label">Discord</div>
          </div>
          <div class="rh-card" role="button" tabindex="0" onclick="launch('reddit')">
            <div class="rh-icon">👾</div>
            <div class="rh-label">Reddit</div>
          </div>
          <div class="rh-card" role="button" tabindex="0" onclick="launch('twitch')">
            <div class="rh-icon">🎮</div>
            <div class="rh-label">Twitch</div>
          </div>
          <div class="rh-card" role="button" tabindex="0" onclick="launch('google')">
            <div class="rh-icon">🔍</div>
            <div class="rh-label">Google</div>
          </div>
          <div class="rh-card" role="button" tabindex="0" onclick="launch('nilered')">
            <div class="rh-icon">🧪</div>
            <div class="rh-label">NileRed</div>
          </div>
        </div>

        <div class="nt-version">Tachyon v1.0.0</div>
      </div>

      <!-- Inline iframe view -->
      <div id="inline-container" class="inline-frame-wrap hidden">
        <iframe id="inline-frame" src="" allowfullscreen></iframe>
      </div>

    </div><!-- /.page-area -->
  </div><!-- /.browser-chrome -->

  <script src="app.js"></script>
  <script>
    // Proxy status indicator
    function connectLauncherLog() {
      const sse = new EventSource(`${PROXY}/__tachyon_log__`);
      const dot   = document.getElementById('proxy-dot');
      const label = document.getElementById('proxy-label');

      sse.onopen = () => {
        dot.className = 'dot online';
        label.textContent = 'Proxy online';
      };
      sse.onmessage = e => {
        try {
          const entry = JSON.parse(e.data);
          dot.className = 'dot online';
          if (entry.type === 'request') {
            try {
              const inner = new URL(decodeURIComponent(new URL(entry.extra.url).pathname.slice(1)));
              label.textContent = inner.hostname + inner.pathname.slice(0, 40);
            } catch { label.textContent = 'Proxy online'; }
          }
        } catch {}
      };
      sse.onerror = () => {
        dot.className = 'dot offline';
        label.textContent = 'Proxy offline';
        setTimeout(connectLauncherLog, 3000);
        sse.close();
      };
    }
    connectLauncherLog();

    // Enter in address bar launches AB-cloaked
    document.getElementById('customUrl').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') launchCustom('aboutblank');
    });

    // Clicking the address bar selects all text
    document.getElementById('customUrl').addEventListener('focus', function() {
      this.select();
    });

    // Keyboard activation of site cards
    document.getElementById('grid').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        const card = e.target.closest('.rh-card');
        if (card) { e.preventDefault(); card.click(); }
      }
    });
  </script>
</body>
</html>
