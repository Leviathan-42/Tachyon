<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tachyon</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="rh-container">

    <div class="rh-header">
      <div class="rh-status">
        <span id="proxy-dot" class="dot offline"></span>
        <span id="proxy-label">Proxy offline — run <code>npm start</code> first</span>
      </div>
    </div>

    <div class="rh-hero">
      <div class="rh-mascot">🦈</div>
      <h1 class="rh-title">Tachyon</h1>
      <p class="rh-subtitle">Click on the URL bar to start browsing.</p>

      <div class="rh-urlbar-row">
        <input type="text" id="customUrl" class="rh-urlbar" placeholder="https://www.google.com" />
      </div>

      <div class="rh-btn-row">
        <button class="rh-btn" onclick="launchCustom('aboutblank')">Open AB cloaked</button>
        <button class="rh-btn" onclick="launchCustom('iframe')">Open inline</button>
      </div>

      <p class="rh-or">or choose a site:</p>

      <div class="rh-grid" id="grid">
        <div class="rh-card" onclick="launch('youtube')">
          <div class="rh-icon">▶</div>
          <div class="rh-label">YouTube</div>
        </div>
        <div class="rh-card" onclick="launch('spotify')">
          <div class="rh-icon">🎵</div>
          <div class="rh-label">Spotify</div>
        </div>
        <div class="rh-card" onclick="launch('discord')">
          <div class="rh-icon">💬</div>
          <div class="rh-label">Discord</div>
        </div>
        <div class="rh-card" onclick="launch('reddit')">
          <div class="rh-icon">👾</div>
          <div class="rh-label">Reddit</div>
        </div>
        <div class="rh-card" onclick="launch('twitch')">
          <div class="rh-icon">🎮</div>
          <div class="rh-label">Twitch</div>
        </div>
        <div class="rh-card" onclick="launch('google')">
          <div class="rh-icon">🔍</div>
          <div class="rh-label">Google</div>
        </div>
        <div class="rh-card" onclick="launch('nilered')">
          <div class="rh-icon">🧪</div>
          <div class="rh-label">NileRed</div>
        </div>
      </div>
    </div>

    <div id="inline-container" class="rh-inline-container hidden">
      <div class="rh-inline-bar">
        <span id="inline-label">-</span>
        <button onclick="closeInline()">Close</button>
      </div>
      <iframe id="inline-frame" src="" allowfullscreen></iframe>
    </div>

    <div class="rh-version">
      <p>Tachyon v1.0.0</p>
    </div>

  </div>

  <script src="app.js"></script>
  <script>
    // Proxy status indicator
    function connectLauncherLog() {
      const sse = new EventSource(`${PROXY}/__tachyon_log__`);
      sse.onopen = () => {
        document.getElementById('proxy-dot').className = 'dot online';
        document.getElementById('proxy-label').textContent = 'Proxy online';
      };
      sse.onmessage = e => {
        try {
          const entry = JSON.parse(e.data);
          const dot = document.getElementById('proxy-dot');
          const label = document.getElementById('proxy-label');
          dot.className = 'dot online';
          if (entry.type === 'request') {
            try {
              const inner = new URL(decodeURIComponent(new URL(entry.extra.url).pathname.slice(1)));
              label.textContent = '→ ' + inner.hostname + inner.pathname.slice(0, 40);
            } catch { label.textContent = 'Proxy online'; }
          }
        } catch {}
      };
      sse.onerror = () => {
        document.getElementById('proxy-dot').className = 'dot offline';
        document.getElementById('proxy-label').textContent = 'Proxy offline — run npm start first';
        setTimeout(connectLauncherLog, 3000);
        sse.close();
      };
    }
    connectLauncherLog();

    // Allow pressing Enter in URL box
    document.getElementById('customUrl').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') launchCustom('aboutblank');
    });
  </script>
</body>
</html>
