<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tachyon</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1 class="title">Tachyon</h1>
    <p class="subtitle">Select a site to open</p>

    <div class="proxy-status">
      <span id="proxy-dot" class="dot offline"></span>
      <span id="proxy-label">Proxy offline — run <code>npm start</code> first</span>
    </div>

    <div class="search-bar">
      <input type="text" id="customUrl" placeholder="Enter a URL..." />
      <button onclick="launchCustom()">Go</button>
    </div>

    <div class="grid" id="grid">

      <div class="card" onclick="launch('youtube')">
        <div class="icon">▶</div>
        <div class="label">YouTube</div>
      </div>

      <div class="card" onclick="launch('spotify')">
        <div class="icon">🎵</div>
        <div class="label">Spotify</div>
      </div>

      <div class="card" onclick="launch('discord')">
        <div class="icon">💬</div>
        <div class="label">Discord</div>
      </div>

      <div class="card" onclick="launch('reddit')">
        <div class="icon">👾</div>
        <div class="label">Reddit</div>
      </div>

      <div class="card" onclick="launch('twitch')">
        <div class="icon">🎮</div>
        <div class="label">Twitch</div>
      </div>

      <div class="card" onclick="launch('google')">
        <div class="icon">🔍</div>
        <div class="label">Google</div>
      </div>

      <div class="card" onclick="launch('nilered')">
        <div class="icon">🧪</div>
        <div class="label">NileRed</div>
      </div>

    </div>

    <div class="view-toggle">
      <span>View:</span>
      <label><input type="radio" name="method" value="aboutblank" checked> New tab (about:blank)</label>
      <label><input type="radio" name="method" value="iframe"> Inline</label>
    </div>

    <div id="inline-container" class="inline-container hidden">
      <div class="inline-bar">
        <span id="inline-label">-</span>
        <button onclick="closeInline()">Close</button>
      </div>
      <iframe id="inline-frame" src="" allowfullscreen></iframe>
    </div>

  </div>

  <script src="app.js"></script>
  <script>
    // mini log indicator on launcher — just shows proxy is alive and last event
    const PROXY = 'http://127.0.0.1:8080';
    function connectLauncherLog() {
      const sse = new EventSource(`${PROXY}/__tachyon_log__`);
      sse.onmessage = e => {
        try {
          const entry = JSON.parse(e.data);
          const dot = document.getElementById('proxy-dot');
          const label = document.getElementById('proxy-label');
          dot.className = 'dot online';
          if (entry.type === 'request') {
            try {
              const inner = new URL(decodeURIComponent(new URL(entry.extra.url).pathname.slice(1)));
              label.textContent = '→ ' + inner.hostname + inner.pathname.slice(0, 40);
            } catch { label.textContent = 'Proxy online'; }
          }
        } catch {}
      };
      sse.onerror = () => {
        document.getElementById('proxy-dot').className = 'dot offline';
        document.getElementById('proxy-label').textContent = 'Proxy offline — run npm start first';
        setTimeout(connectLauncherLog, 3000);
        sse.close();
      };
    }
    connectLauncherLog();
  </script>
</body>
</html>
