services:
  proxy:
    build: .
    container_name: tachyon-proxy
    restart: unless-stopped
    environment:
      - BIND_HOST=0.0.0.0

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: tachyon-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --credentials-file /etc/cloudflared/tunnel-credentials.json --url http://tachyon-proxy:8080 run d8829870-e157-4914-b436-926f685ddd40
    volumes:
      - ./tunnel-credentials.json:/etc/cloudflared/tunnel-credentials.json:ro
    depends_on:
      - proxy
