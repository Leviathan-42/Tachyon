<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tachyon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0f0f0f; overflow: hidden; }
    #frame { width: 100%; height: 100%; border: none; display: block; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0f0f0f; color: #666;
      font-family: 'Segoe UI', sans-serif; font-size: 0.9rem;
      gap: 16px; z-index: 999;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid #2a2a2a;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span id="loading-text">Loading...</span>
  </div>
  <iframe
    id="frame"
    src=""
    allowfullscreen
    allow="autoplay; fullscreen; encrypted-media; microphone; camera; clipboard-read; clipboard-write"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-modals allow-downloads allow-pointer-lock"
  ></iframe>
  <script>
    const params = new URLSearchParams(window.location.search);
    const url = params.get('url');
    const frame = document.getElementById('frame');
    const loading = document.getElementById('loading');
    const loadingText = document.getElementById('loading-text');

    if (!url) {
      loadingText.textContent = 'No URL provided.';
    } else {
      // update tab title from url
      try {
        const u = new URL(decodeURIComponent(url));
        // extract real hostname from proxy url
        const inner = new URL(decodeURIComponent(u.pathname.slice(1)));
        document.title = inner.hostname;
        loadingText.textContent = 'Loading ' + inner.hostname + '...';
      } catch { document.title = 'Tachyon'; }

      frame.src = url;

      frame.addEventListener('load', () => {
        loading.style.display = 'none';
        try {
          // try to update title from iframe
          const t = frame.contentDocument && frame.contentDocument.title;
          if (t) document.title = t;
        } catch {}
      });

      // fallback hide loading after 15s
      setTimeout(() => { loading.style.display = 'none'; }, 15000);
    }
  </script>
</body>
</html>
