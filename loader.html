<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tachyon</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0f0f0f; overflow: hidden; }
    #frame { width: 100%; height: 100%; border: none; display: block; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0f0f0f; color: #666;
      font-family: 'Segoe UI', sans-serif; font-size: 0.9rem;
      gap: 16px; z-index: 999;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid #2a2a2a;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span id="loading-text">Loading...</span>
  </div>
  <iframe
    id="frame"
    src=""
    allowfullscreen
    allow="autoplay; fullscreen; encrypted-media; microphone; camera; clipboard-read; clipboard-write"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-modals allow-downloads allow-pointer-lock"
  ></iframe>
  <!-- log panel -->
  <div id="log-panel">
    <div id="log-header">
      <span id="log-title">Tachyon Log</span>
      <div id="log-controls">
        <label><input type="checkbox" id="log-autoscroll" checked> Auto-scroll</label>
        <button id="log-clear">Clear</button>
        <button id="log-toggle">Hide</button>
      </div>
    </div>
    <div id="log-body"></div>
  </div>

  <style>
    #log-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 180px;
      background: rgba(10,10,10,0.96);
      border-top: 1px solid #222;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 11px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      transition: height 0.2s;
    }
    #log-panel.collapsed { height: 28px; }
    #log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      height: 28px;
      background: #111;
      border-bottom: 1px solid #1f1f1f;
      flex-shrink: 0;
      cursor: pointer;
      user-select: none;
    }
    #log-title { color: #666; font-size: 11px; letter-spacing: 0.05em; }
    #log-controls { display: flex; align-items: center; gap: 10px; }
    #log-controls label { color: #555; display: flex; align-items: center; gap: 4px; cursor: pointer; }
    #log-controls input[type=checkbox] { accent-color: #555; }
    #log-controls button {
      background: none; border: 1px solid #2a2a2a; border-radius: 3px;
      color: #555; padding: 1px 8px; cursor: pointer; font-size: 10px;
    }
    #log-controls button:hover { border-color: #444; color: #888; }
    #log-body {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .log-entry {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 1px 10px;
      line-height: 1.5;
      border-bottom: 1px solid #0d0d0d;
    }
    .log-entry:hover { background: #111; }
    .log-time { color: #333; flex-shrink: 0; font-size: 10px; }
    .log-tag {
      flex-shrink: 0;
      font-size: 9px;
      padding: 0 4px;
      border-radius: 2px;
      font-weight: bold;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .tag-request  { background: #1a2a3a; color: #4a9eff; }
    .tag-response { background: #0e2a1a; color: #4caf50; }
    .tag-warn     { background: #2a1f00; color: #f5a623; }
    .tag-error    { background: #2a0e0e; color: #f44336; }
    .tag-info     { background: #1a1a1a; color: #666; }
    .log-status-ok  { color: #4caf50; }
    .log-status-err { color: #f44336; }
    .log-status-rdr { color: #f5a623; }
    .log-msg { color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .log-msg .url { color: #888; }
    .log-msg .host { color: #aaa; }
    .log-msg .ct { color: #444; margin-left: 6px; }
  </style>

  <script>
    const PROXY = 'http://127.0.0.1:8080';
    const params = new URLSearchParams(window.location.search);
    const url = params.get('url');
    const frame = document.getElementById('frame');
    const loading = document.getElementById('loading');
    const loadingText = document.getElementById('loading-text');

    // ── frame loading ──
    if (!url) {
      loadingText.textContent = 'No URL provided.';
    } else {
      try {
        const u = new URL(decodeURIComponent(url));
        const inner = new URL(decodeURIComponent(u.pathname.slice(1)));
        document.title = inner.hostname;
        loadingText.textContent = 'Loading ' + inner.hostname + '...';
      } catch { document.title = 'Tachyon'; }

      frame.src = url;
      frame.addEventListener('load', () => {
        loading.style.display = 'none';
        try {
          const t = frame.contentDocument && frame.contentDocument.title;
          if (t) document.title = t;
        } catch {}
      });
      setTimeout(() => { loading.style.display = 'none'; }, 15000);
    }

    // ── log panel ──
    const panel    = document.getElementById('log-panel');
    const logBody  = document.getElementById('log-body');
    const btnClear  = document.getElementById('log-clear');
    const btnToggle = document.getElementById('log-toggle');
    const chkScroll = document.getElementById('log-autoscroll');
    const logHeader = document.getElementById('log-header');
    let collapsed = false;
    let entryCount = 0;

    function pad(n){ return String(n).padStart(2,'0'); }
    function fmtTime(ts){
      const d = new Date(ts);
      return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function tryHost(url) {
      try { return new URL(decodeURIComponent(new URL(url).pathname.slice(1))).hostname; }
      catch { try { return new URL(url).hostname; } catch { return url; } }
    }

    function addEntry(entry) {
      const { type, message, extra, ts } = entry;
      const el = document.createElement('div');
      el.className = 'log-entry';

      const time = document.createElement('span');
      time.className = 'log-time';
      time.textContent = fmtTime(ts);

      const tag = document.createElement('span');
      tag.className = `log-tag tag-${type}`;
      tag.textContent = type;

      const msg = document.createElement('span');
      msg.className = 'log-msg';

      if (type === 'request' && extra) {
        const host = document.createElement('span');
        host.className = 'host';
        host.textContent = tryHost(extra.url);
        const path = document.createElement('span');
        path.className = 'url';
        try {
          const inner = new URL(decodeURIComponent(new URL(extra.url).pathname.slice(1)));
          path.textContent = ' ' + inner.pathname.slice(0, 60);
        } catch {}
        msg.appendChild(host);
        msg.appendChild(path);
      } else if (type === 'response' && extra) {
        const status = document.createElement('span');
        const s = extra.status;
        status.className = s < 300 ? 'log-status-ok' : s < 400 ? 'log-status-rdr' : 'log-status-err';
        status.textContent = s + ' ';
        const host = document.createElement('span');
        host.className = 'host';
        host.textContent = tryHost(extra.url);
        const ct = document.createElement('span');
        ct.className = 'ct';
        ct.textContent = (extra.contentType || '').split(';')[0];
        const proto = document.createElement('span');
        proto.className = 'log-time';
        proto.textContent = ' [' + (extra.proto || '') + ']';
        msg.appendChild(status);
        msg.appendChild(host);
        msg.appendChild(ct);
        msg.appendChild(proto);
      } else {
        msg.textContent = message;
      }

      el.appendChild(time);
      el.appendChild(tag);
      el.appendChild(msg);
      logBody.appendChild(el);
      entryCount++;

      // trim to 500 entries
      while (logBody.children.length > 500) logBody.removeChild(logBody.firstChild);

      if (chkScroll.checked) logBody.scrollTop = logBody.scrollHeight;
    }

    // toggle collapse
    btnToggle.addEventListener('click', e => {
      e.stopPropagation();
      collapsed = !collapsed;
      panel.classList.toggle('collapsed', collapsed);
      btnToggle.textContent = collapsed ? 'Show' : 'Hide';
    });
    logHeader.addEventListener('click', () => {
      btnToggle.click();
    });

    btnClear.addEventListener('click', e => {
      e.stopPropagation();
      logBody.innerHTML = '';
      entryCount = 0;
    });

    // SSE connection
    function connectLog() {
      const sse = new EventSource(`${PROXY}/__tachyon_log__`);
      sse.onmessage = e => {
        try { addEntry(JSON.parse(e.data)); } catch (err) { console.warn('SSE parse error:', err); }
      };
      sse.onerror = () => {
        setTimeout(connectLog, 2000);
        sse.close();
      };
    }
    connectLog();
  </script>
</body>
</html>
